name: Release Charts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Package and publish Helm charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                --username ${{ github.actor }} \
                --password-stdin

      - name: Derive tag
        id: tag
        run: echo "TAG=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update chart versions
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          sed -i "s/^version:.*/version: ${TAG}/" charts/panopticon/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" charts/panopticon/Chart.yaml
          sed -i "s/^version:.*/version: ${TAG}/" charts/station/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" charts/station/Chart.yaml

      - name: Package and push panopticon chart
        run: |
          helm package charts/panopticon
          helm push save-phippy-panopticon-${{ steps.tag.outputs.TAG }}.tgz \
            oci://ghcr.io/buoyantio

      - name: Package and push station chart
        run: |
          helm package charts/station
          helm push save-phippy-station-${{ steps.tag.outputs.TAG }}.tgz \
            oci://ghcr.io/buoyantio
